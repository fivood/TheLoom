name: Release Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '发布标签(如 v0.17.0);手动触发时必填,Release 会自动创建该标签'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci
      - run: npm test
      - run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Read release notes
        id: release_notes
        shell: pwsh
        run: |
          "body<<EOF" >> $env:GITHUB_OUTPUT
          Get-Content -LiteralPath 'RELEASE_NOTES.md' -Raw >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'TheLoom ${{ inputs.tag || github.ref_name }}'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

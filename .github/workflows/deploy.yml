name: Deploy Web to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Check Cloudflare secrets
        id: check
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::未配置 CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID 密钥,跳过部署(仅验证构建)。配置方法见 README「部署到 Cloudflare Pages」。"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.configured == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 项目已存在时 create 会失败,忽略即可
          npx wrangler pages project create theloom --production-branch=main 2>/dev/null || true
          npx wrangler pages deploy dist --project-name=theloom --branch=main
